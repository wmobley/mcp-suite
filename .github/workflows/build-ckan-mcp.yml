name: build-ckan-mcp

# Build and push the DSO CKAN MCP server image to GHCR, then
# register or restart the dsomcp pod on portals.tapis.io.
#
# Required GitHub secrets (in the "Tapis Configure" environment):
#   TAPIS_USERNAME          — Tapis portal username
#   TAPIS_PASSWORD          — Tapis portal password
#
# Optional pod env-var secrets (add as needed):
#   CKAN_BASE_URL           — CKAN portal URL
#   MCP_HTTP_SHARED_SECRET  — shared secret for MCP HTTP endpoint auth
#
# The GHCR package must be set to PUBLIC so Tapis pods can pull it
# without image-pull credentials. Set this once via:
#   GitHub → Packages → ckan-mcp → Package settings → Change visibility
#
# Build context: servers/ckan/

on:
  push:
    branches: [main]
    paths:
      - "servers/ckan/**"
      - ".github/workflows/build-ckan-mcp.yml"
      - ".github/scripts/**"
    tags:
      - "v*"
  pull_request:
    paths:
      - "servers/ckan/**"
      - ".github/workflows/build-ckan-mcp.yml"
      - ".github/scripts/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}/ckan-mcp
  POD_ID: dsomcp
  TAPIS_BASE: https://portals.tapis.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Tapis Configure
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: servers/ckan
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Tapis pod
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          TAPIS_USERNAME: ${{ secrets.TAPIS_USERNAME }}
          TAPIS_PASSWORD: ${{ secrets.TAPIS_PASSWORD }}
          CKAN_BASE_URL: ${{ secrets.CKAN_BASE_URL }}
          MCP_HTTP_SHARED_SECRET: ${{ secrets.MCP_HTTP_SHARED_SECRET }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        run: |
          pip install --quiet tapipy
          python3 .github/scripts/tapis_deploy.py

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## ckan-mcp build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Pushed image tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tapis pod: \`${POD_ID}\` on \`portals.tapis.io\`" >> "$GITHUB_STEP_SUMMARY"
